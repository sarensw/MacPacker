# ── Per-app release distribution shell ───────────────────────────────────────
# Copy into each app repo at .github/workflows/distribute-release.yml.
# Triggered by pushing a v*.*.* tag. Strict fail-safe order: GH Release is
# only created after every other publish step succeeds.
# ─────────────────────────────────────────────────────────────────────────────
name: Distribute Release

on:
  push:
    tags:
      - 'v*.*.*'
      - '!v*-beta.*'   # exclude beta tags auto-pushed by distribute-beta.yml

permissions:
  contents: write    # for the GH Release

jobs:
  release:
    uses: LeanBytes/workflows-macos/.github/workflows/distribute-release.yml@v0.3.27
    secrets: 
      DEVELOPER_ID_P12_BASE64:        ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
      DEVELOPER_ID_PASSWORD:          ${{ secrets.DEVELOPER_ID_PASSWORD }}
      KEYCHAIN_PASSWORD:              ${{ secrets.KEYCHAIN_PASSWORD }}
      PROV_PROF_DEVID_BASE64:         ${{ secrets.PROV_PROF_DEVID_BASE64 }}
      PROV_PROF_DEVID_FINDER_BASE64:  ${{ secrets.PROV_PROF_DEVID_FINDER_BASE64 }}
      PROV_PROF_DEVID_QL_BASE64:      ${{ secrets.PROV_PROF_DEVID_QL_BASE64 }}
      APPLE_DISTR_P12_BASE64:         ${{ secrets.APPLE_DISTR_P12_BASE64 }}
      APPLE_DISTR_PASSWORD:           ${{ secrets.APPLE_DISTR_PASSWORD }}
      MAC_DISTR_P12_BASE64:           ${{ secrets.MAC_DISTR_P12_BASE64 }}
      MAC_DISTR_PASSWORD:             ${{ secrets.MAC_DISTR_PASSWORD }}
      PROV_PROF_STORE_BASE64:         ${{ secrets.PROV_PROF_STORE_BASE64 }}
      PROV_PROF_STORE_FINDER_BASE64:  ${{ secrets.PROV_PROF_STORE_FINDER_BASE64 }}
      PROV_PROF_STORE_QL_BASE64:      ${{ secrets.PROV_PROF_STORE_QL_BASE64 }}
      ASC_KEY_ID:                     ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID:                  ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_BASE64:                 ${{ secrets.ASC_KEY_BASE64 }}
      AWS_ACCESS_KEY_ID:              ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY:          ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      SPARKLE_ED_PRIVATE_KEY:         ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
      SHARED_WORKFLOWS_TOKEN:         ${{ secrets.SHARED_WORKFLOWS_TOKEN }}
    with:
      # ── Build toggles ─
      build-direct: true
      build-app-store: true

      # ── Distribute toggles ──
      distribute-app-store: true
      distribute-stable-appcast: true

      # ── Per-app build flags ──
      has-finder-extension: true
      has-quicklook-extension: true

      # ── Build configuration ──
      configuration-direct: Release
      configuration-app-store: Release Store