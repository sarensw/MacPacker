# ── Snapshot Distribution ────────────────────────────────────────────────────
# Triggered when a PR is merged into main.
# Builds a snapshot, uploads to S3, and comments on the PR with download links.
# ─────────────────────────────────────────────────────────────────────────────
name: Distribute Snapshot

on:
  pull_request:
    types: [closed]
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Determine version info and call the reusable build workflow ────────────
  prepare:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      build-number: ${{ steps.version.outputs.build-number }}
      artifact-label: ${{ steps.version.outputs.artifact-label }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version info
        id: version
        shell: bash
        run: |
          set -euo pipefail

          # Timestamp-based build number in UTC (always increasing)
          BUILD_NUMBER=$(date -u +%y%m%d%H%M%S)

          # Marketing version from Config/Version.xcconfig (single source of truth)
          VERSION=$(grep 'MARKETING_VERSION' Config/Version.xcconfig | sed 's/.*= *//')

          ARTIFACT_LABEL="${VERSION}-beta-${BUILD_NUMBER}"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build-number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "artifact-label=${ARTIFACT_LABEL}" >> $GITHUB_OUTPUT

          echo "Snapshot build"
          echo "  Marketing version: ${VERSION} (from Version.xcconfig)"
          echo "  Build number:      ${BUILD_NUMBER}"
          echo "  Artifact label:    ${ARTIFACT_LABEL}"

  build:
    needs: prepare
    uses: ./.github/workflows/distribute-build.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      build-number: ${{ needs.prepare.outputs.build-number }}
      artifact-label: ${{ needs.prepare.outputs.artifact-label }}
    secrets: inherit

  # ── Comment on the merged PR with download links ──────────────────────────
  comment:
    needs: [prepare, build]
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          ARTIFACT_LABEL: ${{ needs.prepare.outputs.artifact-label }}
          S3_DOWNLOAD_URL: ${{ vars.S3_DOWNLOAD_URL }}
        with:
          script: |
            const label = process.env.ARTIFACT_LABEL;
            const baseUrl = process.env.S3_DOWNLOAD_URL;
            const body = [
              `**Snapshot build ready** \u2705`,
              ``,
              `| Artifact | Link |`,
              `|----------|------|`,
              `| DMG | [MacPacker-${label}.dmg](${baseUrl}/MacPacker-${label}.dmg) |`,
              `| ZIP | [MacPacker-${label}.zip](${baseUrl}/MacPacker-${label}.zip) |`,
              ``,
              `Version: \`${{ needs.prepare.outputs.version }}\` · Build: \`${{ needs.prepare.outputs.build-number }}\``,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
