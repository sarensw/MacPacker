# ── App Store Distribution ───────────────────────────────────────────────────
# Builds, signs, and uploads MacPacker to App Store Connect (TestFlight).
# Triggered by version tags or manual dispatch.
# ─────────────────────────────────────────────────────────────────────────────
name: Distribute App Store (macOS)

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  distribute:
    runs-on: [macos-26]
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      # ── Resolve Swift package dependencies ─────────────────────────────────
      - name: Resolve Swift package dependencies
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -scheme "${{ vars.SCHEME_NAME_STORE }}" \
            -configuration Release

      # ── Version & build number ─────────────────────────────────────────────
      - name: Sync version and build number
        shell: bash
        run: |
          set -euo pipefail

          BUILD_NUMBER=$(date -u +%y%m%d%H%M%S)

          # Marketing version from Config/Version.xcconfig (single source of truth)
          VERSION=$(grep 'MARKETING_VERSION' Config/Version.xcconfig | sed 's/.*= *//')

          echo "Version: $VERSION"
          echo "Build number: $BUILD_NUMBER"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

          agvtool new-marketing-version "$VERSION"
          agvtool new-version -all "$BUILD_NUMBER"

      # ── Keychain ───────────────────────────────────────────────────────────
      - name: Set up keychain
        shell: bash
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > /tmp/certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" \
            build.keychain
          security list-keychains -d user -s build.keychain login.keychain

          rm /tmp/certificate.p12

      # ── Provisioning profiles ──────────────────────────────────────────────
      - name: Install provisioning profiles
        shell: bash
        env:
          STORE_PROFILE_BASE64: ${{ secrets.PROV_PROF_STORE_BASE64 }}
          STORE_PROFILE_FINDER_BASE64: ${{ secrets.PROV_PROF_STORE_FINDER_BASE64 }}
          STORE_PROFILE_QUICKLOOK_BASE64: ${{ secrets.PROV_PROF_STORE_QL_BASE64 }}
        run: |
          set -euo pipefail

          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"

          echo "$STORE_PROFILE_BASE64" | base64 --decode \
            > "$PROFILE_DIR/pp-store.provisionprofile"
          echo "$STORE_PROFILE_FINDER_BASE64" | base64 --decode \
            > "$PROFILE_DIR/pp-store-finder.provisionprofile"
          echo "$STORE_PROFILE_QUICKLOOK_BASE64" | base64 --decode \
            > "$PROFILE_DIR/pp-store-quicklook.provisionprofile"

          PROFILE_NAME=$(security cms -D \
            -i "$PROFILE_DIR/pp-store.provisionprofile" \
            | plutil -extract Name raw -)
          PROFILE_NAME_FINDER=$(security cms -D \
            -i "$PROFILE_DIR/pp-store-finder.provisionprofile" \
            | plutil -extract Name raw -)
          PROFILE_NAME_QUICKLOOK=$(security cms -D \
            -i "$PROFILE_DIR/pp-store-quicklook.provisionprofile" \
            | plutil -extract Name raw -)

          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
          echo "PROFILE_NAME_FINDER=$PROFILE_NAME_FINDER" >> $GITHUB_ENV
          echo "PROFILE_NAME_QUICKLOOK=$PROFILE_NAME_QUICKLOOK" >> $GITHUB_ENV

          echo "Main profile: $PROFILE_NAME"
          echo "Finder Extension profile: $PROFILE_NAME_FINDER"
          echo "Quick Look Extension profile: $PROFILE_NAME_QUICKLOOK"

      # ── App Store Connect API key ──────────────────────────────────────────
      - name: Install App Store Connect API key
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

      # ── Archive ────────────────────────────────────────────────────────────
      - name: Archive
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild archive \
            -scheme "${{ vars.SCHEME_NAME_STORE }}" \
            -configuration Release \
            -archivePath /tmp/build/app.xcarchive \
            -destination "generic/platform=macOS" \
            MARKETING_VERSION=$VERSION \
            CURRENT_PROJECT_VERSION=$BUILD_NUMBER

      # ── Export for App Store ───────────────────────────────────────────────
      - name: Export for App Store
        shell: bash
        run: |
          set -euo pipefail

          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ vars.BUNDLE_ID }}</key>
              <string>${PROFILE_NAME}</string>
              <key>${{ vars.BUNDLE_ID_FINDER }}</key>
              <string>${PROFILE_NAME_FINDER}</string>
              <key>${{ vars.BUNDLE_ID_QUICKLOOK }}</key>
              <string>${PROFILE_NAME_QUICKLOOK}</string>
            </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath /tmp/build/app.xcarchive \
            -exportPath /tmp/build/export \
            -exportOptionsPlist /tmp/ExportOptions.plist

      # ── Upload to TestFlight ───────────────────────────────────────────────
      - name: Upload to TestFlight
        shell: bash
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail

          OUTPUT=$(xcrun altool --upload-app \
            --type macos \
            --file /tmp/build/export/*.pkg \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" 2>&1)

          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "UPLOAD FAILED"; then
            echo "ERROR: Upload to TestFlight failed"
            exit 1
          fi

      # ── Cleanup ────────────────────────────────────────────────────────────
      - name: Cleanup
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          security delete-keychain build.keychain || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/pp-store.provisionprofile"
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/pp-store-finder.provisionprofile"
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/pp-store-quicklook.provisionprofile"
          rm -rf /tmp/build
          rm -f /tmp/ExportOptions.plist
          rm -f ~/.appstoreconnect/private_keys/AuthKey_*.p8
          security list-keychains -d user -s login.keychain
